<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="kitty" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcce0"/>
      <stop offset="100%" stop-color="#c44d7a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="10.5" y="3" width="3" height="18" rx="1.5" fill="url(#kitty)" filter="url(#shadow)"/>
  <rect x="3" y="10.5" width="18" height="3" rx="1.5" fill="url(#kitty)" filter="url(#shadow)"/>
</svg>
